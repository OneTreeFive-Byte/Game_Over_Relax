<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NEBULA STRIKE - Cyberpunk Galaxy Shooter. Un videojuego arcade intergaláctico con estética cyberpunk y colores anime.">
  <meta name="keywords" content="juego, arcade, shooter, cyberpunk, anime, space, galaxy">
  <meta name="author" content="Nebula Strike Team">
  <title>NEBULA STRIKE - Cyberpunk Galaxy Shooter</title>
  
  <!-- Fuentes desde Fontsource -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/orbitron@5.0.0/index.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/rajdhani@5.0.0/index.min.css">
  
  <!-- Estilos -->
  <link rel="stylesheet" href="css/style.css">
  
  <!-- Favicon SVG inline -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
</head>
<body>

  <canvas id="gameCanvas"></canvas>
  
  <div class="scanline"></div>
  
  <div id="ui-overlay">
    <div id="hud">
      <div class="hud-item">
        <div class="hud-label">Score</div>
        <div class="hud-value" id="score-value">0</div>
      </div>
      <div class="hud-item">
        <div class="hud-label">Level</div>
        <div class="hud-value" id="level-value">1</div>
      </div>
      <div class="hud-item">
        <div class="hud-label">Lives</div>
        <div id="lives-display"></div>
      </div>
      <div class="hud-item">
        <div class="hud-label">Combo</div>
        <div class="hud-value" id="combo-value">x1</div>
      </div>
    </div>
    
    <div id="power-bar"><div id="power-fill"></div></div>
    <div id="combo-display"></div>
    <div id="level-announce"></div>
    
    <div id="boss-health">
      <div id="boss-name">⚠ BOSS ⚠</div>
      <div id="boss-bar"><div id="boss-fill"></div></div>
    </div>
  </div>
  
  <div id="start-screen">
    <div class="game-title">NEBULA STRIKE</div>
    <div class="game-subtitle">Cyberpunk Galaxy Shooter</div>
    <button class="start-btn" id="startBtn">INICIAR MISIÓN</button>
    <div class="controls-info">
      <span>← →</span> o <span>A D</span> Mover nave<br>
      <span>ESPACIO</span> o <span>CLICK</span> Disparar<br>
      <span>SHIFT</span> Super ataque (cuando esté cargado)<br>
      <span>↑ ↓</span> Mover verticalmente
    </div>
  </div>
  
  <div id="game-over-screen">
    <div class="game-over-title">MISIÓN FALLIDA</div>
    <div class="final-score" id="final-score">SCORE: 0</div>
    <div class="final-level" id="final-level">NIVEL ALCANZADO: 1</div>
    <button class="start-btn" id="restartBtn">REINTENTAR</button>
  </div>

  <!-- Scripts del juego (orden de carga importante) -->
  <script src="js/audio.js"></script>
  <script src="js/background.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/bullet.js"></script>
  <script src="js/player.js"></script>
  <script src="js/enemy.js"></script>
  <script src="js/boss.js"></script>
  <script src="js/powerup.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
